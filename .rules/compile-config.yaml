# DevolaFlow .rules/ governance compiler config (template).
#
# Generated by `devola-init local` (G-J1 closure, audit §3.J).
# Edit this file to declare which .rules/*.mdc layers compose into which
# AI-tool-specific output bundle (Cursor, AGENTS.md, Claude, etc.).
#
# Schema reference: src/devolaflow/local/compiler.py::RuleCompiler
# Layer files (.mdc) live in this same directory and are referenced by
# `name` (the file is resolved as `<name>.mdc` under `source_dir`).

version: "1.0"
source_dir: ".rules"

# Declare each .rules/<name>.mdc file as a numbered priority layer.
# `priority` orders truncation when a target's token_budget is exceeded
# (highest priority number is dropped first; `always_include: true` is
# never dropped). Add entries here as you author new .mdc files.
layers:
  - name: soul
    priority: 0
    always_include: true

# Declare each compiled output bundle (one per consuming AI tool).
# `output` is RELATIVE to the .rules/ parent (i.e. the repo root).
# `format`: "mdc" | "markdown" | "markdown_append".
# `include_layers`: subset of declared layer names, in any order.
targets:
  agents_md:
    output: "AGENTS.md"
    format: markdown
    token_budget: 6000
    include_layers: [soul]

# Drift detection writes per-target SHA256 hashes after each `sync-rules`
# run; `check-rules-drift` compares disk state to these hashes.
drift_detection:
  enabled: true
  hash_file: ".rules/.compile-hashes.json"
